<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deez NUST EE</title>

<link rel="prefetch" href="https://nate-champion.github.io/PNEC-TimeTable/">
<link rel="prefetch" href="https://nate-champion.github.io/StudHUB/">

<style>

:root{
--bg:#14141a;
--card:#1f1f29;
--card-hover:#2a2a36;

--text:#ffffff;
--sub:#b8b8c9;

--border:#343446;

--pink:#ffb6c1;
--blue:#a0d8ff;
--green:#caffbf;

--pink-glow:rgba(255,182,193,.35);
--blue-glow:rgba(160,216,255,.35);
--green-glow:rgba(202,255,191,.35);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:system-ui,-apple-system,sans-serif;
background:var(--bg);
color:var(--text);

min-height:100vh;

display:flex;
justify-content:center;
align-items:flex-start;

padding:40px 20px;

overflow-x:hidden;
overflow-y:auto;

/* paw pattern */
background-image:
radial-gradient(circle at 25px 25px, rgba(255,255,255,.03) 3px, transparent 4px);
background-size:60px 60px;

}

.container{
width:100%;
max-width:900px;
animation:fadeIn .8s ease forwards;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* title */

.title{

text-align:center;
font-size:2.7rem;
font-weight:800;
margin-bottom:3rem;

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:.05em;

}

.title span{
opacity:0;
transform:translateY(20px);
animation:titleAnim .6s forwards;
}

@keyframes titleAnim{
to{
opacity:1;
transform:translateY(0);
}
}

/* grid */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:1.5rem;

}

/* cards */

.card{

background:var(--card);
border:1px solid var(--border);

border-radius:18px;

padding:2.2rem 1.5rem;

text-align:center;

cursor:pointer;

display:flex;
flex-direction:column;
align-items:center;

transition:.35s cubic-bezier(.23,1,.32,1);

position:relative;
overflow:hidden;

}

.card:hover{

background:var(--card-hover);

transform:translateY(-8px) scale(1.03) rotate(-1deg);

}

/* glow */

.card.drive:hover{box-shadow:0 14px 30px -10px var(--pink-glow)}
.card.schedule:hover{box-shadow:0 14px 30px -10px var(--blue-glow)}
.card.deadline:hover{box-shadow:0 14px 30px -10px var(--green-glow)}

/* icon */

.icon{

width:60px;
height:60px;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

margin-bottom:1.3rem;

transition:.3s;

}

.card:hover .icon{
transform:scale(1.1) rotate(-5deg);
}

.drive .icon{
border:1px solid var(--pink);
background:rgba(255,182,193,.1);
}

.schedule .icon{
border:1px solid var(--blue);
background:rgba(160,216,255,.1);
}

.deadline .icon{
border:1px solid var(--green);
background:rgba(202,255,191,.1);
}

/* text */

.card h2{
font-size:1.3rem;
margin-bottom:.4rem;
}

.card p{
color:var(--sub);
font-size:.95rem;
line-height:1.5;
}

/* ripple */

.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.15);
transform:scale(0);
animation:ripple .6s linear;
pointer-events:none;
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

/* mobile */

@media(max-width:600px){

.title{
font-size:2.2rem;
}

.card{
padding:1.8rem 1rem;
}

}

</style>
</head>

<body>

<div class="container">

<h1 class="title" id="title"></h1>

<div class="grid">

<div class="card drive" data-url="https://drive.google.com/drive/folders/1tDFa62rsIlqEqzceLALHuTg-BDlltLmT" data-haptic="light">

<div class="icon">📁</div>

<h2>Google Drive</h2>
<p>Shared notes, books and class files.</p>

</div>

<div class="card schedule" data-url="https://nate-champion.github.io/PNEC-TimeTable/" data-haptic="medium">

<div class="icon">📅</div>

<h2>Schedule</h2>
<p>View weekly timetable.</p>

</div>

<div class="card deadline" data-url="https://nate-champion.github.io/StudHUB/" data-haptic="heavy">

<div class="icon">⏰</div>

<h2>Deadlines</h2>
<p>Track assignments and quizzes</p>

</div>

</div>
</div>

<script>

/* title animation */

const text="PNEC EE 2k29";
const title=document.getElementById("title");

text.split("").forEach((char,i)=>{

const span=document.createElement("span");

span.textContent=char===" "?"\u00A0":char;

span.style.animationDelay=i*50+"ms";

title.appendChild(span);

});

/* haptics */

const patterns={
light:[10],
medium:[30],
heavy:[60]
};

function vibrate(type){

if(navigator.vibrate){

navigator.vibrate(patterns[type]||patterns.medium);

}

}

/* ripple */

function ripple(e,card){

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

const r=document.createElement("span");

r.className="ripple";

r.style.left=x+"px";
r.style.top=y+"px";

card.appendChild(r);

r.addEventListener("animationend",()=>r.remove());

}

/* card logic */

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("click",e=>{

const h=card.dataset.haptic;

vibrate(h);

ripple(e,card);

setTimeout(()=>{

window.location.href=card.dataset.url;

},200);

});

});

</script>

</body>
</html>
